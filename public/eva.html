<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI SYSTEM - NERV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #00ff41;
            font-family: 'Orbitron', monospace;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 背景のアニメーション */
        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,255,65,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,65,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* NERV風ヘッダー */
        .nerv-header {
            text-align: center;
            border: 3px solid #ff6b00;
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            padding: 30px;
            margin-bottom: 40px;
            position: relative;
            box-shadow: 0 0 30px #ff6b00;
        }
        
        .nerv-header::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(45deg, #ff6b00, #ff0000, #ff6b00);
            z-index: -1;
            filter: blur(10px);
        }
        
        .magi-logo {
            font-size: 3em;
            font-weight: 900;
            color: #ff6b00;
            text-shadow: 0 0 20px #ff6b00;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        
        .system-status {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .status-item {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }
        
        /* 入力セクション */
        .command-interface {
            background: #111;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0,255,65,0.3);
        }
        
        .interface-title {
            color: #ff6b00;
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .input-field {
            width: 100%;
            height: 120px;
            background: #000;
            color: #00ff41;
            border: 2px solid #00ff41;
            padding: 15px;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            resize: vertical;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.2);
        }
        
        .input-field:focus {
            outline: none;
            box-shadow: 0 0 20px #00ff41, inset 0 0 10px rgba(0,255,65,0.3);
            text-shadow: 0 0 5px #00ff41;
        }
        
        .execute-btn {
            background: linear-gradient(45deg, #ff0000, #ff6b00);
            color: white;
            border: none;
            padding: 15px 40px;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255,107,0,0.5);
        }
        
        .execute-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,107,0,0.8);
        }
        
        .execute-btn:disabled {
            background: #333;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* ローディング */
        .processing {
            background: #1a1a1a;
            border: 2px solid #ff6b00;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .processing-text {
            font-size: 1.3em;
            color: #ff6b00;
            margin-bottom: 20px;
        }
        
        .progress-bars {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .progress-item {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .ai-name {
            width: 100px;
            color: #00ff41;
            font-weight: 700;
        }
        
        .progress-bar {
            flex: 1;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #ff0000);
            width: 0%;
            animation: progressFill 2s ease-in-out forwards;
        }
        
        @keyframes progressFill {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        /* 結果表示 */
        .magi-results {
            display: grid;
            gap: 20px;
        }
        
        .result-terminal {
            background: #000;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 25px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        
        .terminal-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
        }
        
        .terminal-title {
            color: #ff6b00;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .ai-responses {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .ai-terminal {
            background: #0a0a0a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 20px;
            position: relative;
        }
        
        .ai-terminal::before {
            content: attr(data-ai);
            position: absolute;
            top: -12px;
            left: 15px;
            background: #000;
            color: #ff6b00;
            padding: 0 10px;
            font-size: 0.9em;
            font-weight: 700;
        }
        
        .ai-response {
            color: #00ff41;
            line-height: 1.6;
            text-shadow: 0 0 3px rgba(0,255,65,0.5);
            white-space: pre-wrap;
        }
        
        .final-analysis {
            background: linear-gradient(45deg, #1a1a1a, #2a1a1a);
            border: 3px solid #ff6b00;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(255,107,0,0.3);
        }
        
        .analysis-title {
            color: #ff6b00;
            font-size: 1.5em;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .analysis-content {
            color: #00ff41;
            white-space: pre-wrap;
            line-height: 1.8;
            text-shadow: 0 0 5px rgba(0,255,65,0.3);
        }
        
        .hidden {
            display: none;
        }
        
        /* エラー表示 */
        .error-alert {
            background: #2a0000;
            border: 2px solid #ff0000;
            color: #ff6666;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }
        
        /* レスポンシブ対応 */
        @media (max-width: 768px) {
            .magi-logo {
                font-size: 2em;
                letter-spacing: 4px;
            }
            
            .ai-responses {
                grid-template-columns: 1fr;
            }
            
            .system-status {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    
    <div class="container">
        <header class="nerv-header">
            <div class="magi-logo">MAGI SYSTEM</div>
            <p>MULTI-AGENT GENERATIVE INTELLIGENCE</p>
            <p style="font-size: 0.9em; margin-top: 10px;">NERV HEADQUARTERS - TOKYO-3</p>
            
            <div class="system-status">
                <div class="status-item">MELCHIOR: ONLINE</div>
                <div class="status-item">BALTHASAR: ONLINE</div>
                <div class="status-item">CASPER: ONLINE</div>
            </div>
        </header>
        
        <div class="command-interface">
            <div class="interface-title">COMMAND INPUT TERMINAL</div>
            <textarea id="queryInput" class="input-field" placeholder="Enter your query to the MAGI system..."></textarea>
            <button id="executeBtn" class="execute-btn" onclick="executeQuery()">EXECUTE ANALYSIS</button>
        </div>
        
        <div id="processing" class="processing hidden">
            <div class="processing-text">MAGI SYSTEM PROCESSING...</div>
            <div class="progress-bars">
                <div class="progress-item">
                    <div class="ai-name">MELCHIOR</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
                <div class="progress-item">
                    <div class="ai-name">BALTHASAR</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
                <div class="progress-item">
                    <div class="ai-name">CASPER</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
            </div>
        </div>
        
        <div id="results" class="magi-results"></div>
    </div>

    <script>
        async function executeQuery() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('COMMAND INPUT REQUIRED');
                return;
            }
            
            const processing = document.getElementById('processing');
            const results = document.getElementById('results');
            const executeBtn = document.getElementById('executeBtn');
            
            processing.classList.remove('hidden');
            executeBtn.disabled = true;
            results.innerHTML = '';
            
            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: query })
                });
                
                if (!response.ok) {
                    throw new Error(`SYSTEM ERROR: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Response data:', data); // デバッグ用
                
                // プログレスバーのアニメーションを待つ
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                results.innerHTML = `
                    <div class="result-terminal">
                        <div class="terminal-header">
                            <div class="terminal-title">QUERY RECEIVED</div>
                        </div>
                        <div class="ai-response">${data.question}</div>
                    </div>
                    
                    <div class="ai-responses">
                        <div class="ai-terminal" data-ai="MELCHIOR (Gemini)">
                            <div class="ai-response">${data.responses.melchior || 'MELCHIOR PROCESSING...'}</div>
                        </div>
                        <div class="ai-terminal" data-ai="BALTHASAR (Grok)">
                            <div class="ai-response">${data.responses.balthasar || 'BALTHASAR PROCESSING...'}</div>
                        </div>
                        <div class="ai-terminal" data-ai="CASPER (Claude)">
                            <div class="ai-response">${data.responses.casper || 'CASPER PROCESSING...'}</div>
                        </div>
                    </div>
                    
                    <div class="final-analysis">
                        <div class="analysis-title">MAGI SYSTEM CONSENSUS</div>
                        <div class="analysis-content">${data.finalAnswer}</div>
                    </div>
                `;
                
            } catch (error) {
                console.error('MAGI System Error:', error);
                results.innerHTML = `
                    <div class="error-alert">
                        <div style="font-size: 1.5em; margin-bottom: 15px;">⚠️ SYSTEM ERROR</div>
                        <div>Error Code: ${error.message}</div>
                        <div style="margin-top: 10px; font-size: 0.9em;">Please contact NERV technical support</div>
                    </div>
                `;
            }
            
            processing.classList.add('hidden');
            executeBtn.disabled = false;
        }
        
        // キーボードショートカット
        document.getElementById('queryInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                executeQuery();
            }
        });
    </script>
</body>
</html>
