<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGI System - EVA Interface</title>
    <style>
        body { background: #1a1a1a; color: #0f0; font-family: monospace; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; border: 2px solid #0f0; padding: 20px; }
        .magi-units { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .magi-unit { border: 2px solid #0f0; padding: 15px; }
        button { background: #000; color: #0f0; border: 2px solid #0f0; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MAGI SYSTEM</h1>
        </div>
        <div class="magi-units">
            <div class="magi-unit">
                <h3>MELCHIOR-1</h3>
                <div id="status-grok">STANDBY</div>
            </div>
            <div class="magi-unit">
                <h3>BALTHASAR-2</h3>
                <div id="status-gemini">STANDBY</div>
            </div>
            <div class="magi-unit">
                <h3>CASPER-3</h3>
                <div id="status-claude">STANDBY</div>
            </div>
        </div>
        <div>
            <textarea id="input" rows="3" style="width:100%; background:#000; color:#0f0;"></textarea>
            <button onclick="execute()">EXECUTE</button>
        </div>
        <div id="output" style="border:2px solid #0f0; padding:20px; margin-top:20px;">Ready</div>
    </div>
    <script>
        async function execute() {
            const input = document.getElementById('input').value;
            if (!input) return;
            document.getElementById('output').textContent = 'Processing...';
            try {
                const res = await fetch('/api/consensus', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({prompt: input, meta: {temperature: 0.7}})
                });
                const data = await res.json();
                document.getElementById('output').textContent = data.final || 'Complete';
            } catch(e) {
                document.getElementById('output').textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
