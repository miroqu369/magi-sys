<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magi System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #667eea; text-align: center; }
        .card {
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .card:hover {
            background: #f0f4ff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Magi System</h1>
        <p style="text-align: center;">Multi-LLM Consensus Platform</p>
        
        <div class="card" onclick="location.href='/grok-unique.html'">
            <h2>🚀 Grok Unique Mode</h2>
            <p>Grokの独自視点を体験</p>
        </div>
        
        <div class="card" onclick="location.href='/status'">
            <h2>📊 System Status</h2>
            <p>システム状態を確認</p>
        </div>
        
        <div class="card" onclick="testAPI()">
            <h2>🧪 Test API</h2>
            <p>Consensus APIをテスト</p>
        </div>
        
        <div id="result" style="margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px; display: none;"></div>
    </div>
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Loading...';
            
            try {
                const response = await fetch('/api/consensus', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        prompt: 'Hello, how are you?',
                        meta: {temperature: 0.2}
                    })
                });
                const data = await response.json();
                resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
